version: "3.9"

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ai-service:
    build: ./ai-service
    ports:
      - "3400:3400"
    env_file:
      - ./ai-service/.env
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}

  server:
    build: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/lifesaver
      - AI_SERVICE_URL=http://ai-service:3400
    depends_on:
      - mongo
      - ai-service

  client:
    build: ./client
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  mongo_data:
